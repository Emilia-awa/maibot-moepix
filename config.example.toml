[plugin]
# 是否启用插件。关闭后插件保持空闲，不会注册任何工具或命令。
enabled = true
# 配置结构版本号，用于配置迁移和兼容性判断。请勿手动修改。
config_version = "1.0.0"

[r18]
# 扩展内容白名单。
# 只有在此列表中的群聊/私聊用户才能请求扩展内容。
# 格式说明：
#   - 群聊："group_群号"，例如 "group_231487429"
#   - 私聊："user_QQ号"，例如 "user_499945713"
# 添加方式：
#   1. 管理员在 WebUI 配置编辑器中直接添加
#   2. AI 通过工具动态添加（需 AI 判断用户符合条件）
# 移除方式：
#   1. 管理员在 WebUI 中删除
#   2. AI 通过工具移除
# 注意：未在白名单中的会话，无论命令还是 AI 调用，均不可请求扩展内容。
allowed_chats = []

[api]
# Lolicon API 地址。一般无需修改，除非使用自建 API 代理。
base_url = "https://api.lolicon.app/setu/v2"

# 默认请求图片数量。范围 1-3，用户可通过命令或 AI 工具覆盖此值。
default_num = 1

# 默认图片规格。可选值：
#   - "original"：原始分辨率（文件较大）
#   - "regular"：标准分辨率（推荐，默认）
#   - "small"：小尺寸缩略图
#   - "thumb"：极小缩略图
#   - "mini"：微型缩略图
# 注意：部分旧作品可能仅支持 "original" 规格。
default_size = ["regular"]

# 图片反代地址。
# 留空（""）则使用 Pixiv 原始地址 i.pximg.net（需要服务器能直接访问 Pixiv）。
# 常见反代选项：
#   - "i.pixiv.re"：Cloudflare 反代（可能间歇性不可用）
#   - "i.yuki.sh"：自定义反代
#   - 其他可用的 Pixiv 反代域名
# 如果服务器已配置代理/VPN，建议留空使用直连。
proxy = ""

# 是否排除 AI 生成的作品。建议保持 true，避免潜在的版权争议。
exclude_ai = true

# 单次请求允许获取的最大图片数量。防止滥用，范围 1-3。
max_num = 3

# 发送模式。控制图片以何种形式发送到聊天：
#   - "image"：直接发送图片（默认，体验最好但可能被审查）
#   - "link"：只发送图片链接文本（安全，不会被审查，但需要用户自行打开）
#   - "both"：同时发送图片和链接（兼顾体验和安全）
#   - "kz_link"：全年龄内容发图片，扩展内容发链接（推荐用于防审查场景）
# 中文别名也可以使用："链接"、"两者"
send_mode = "image"

[limits]
# 频率限制：同一会话每分钟最多请求次数。
# 作用于所有请求方式（AI 工具调用和 /setu 命令）。
rate_per_minute = 3

# 色图发送后自动撤回的延迟秒数。
# 设为 0 表示不撤回（图片永久保留）。
# 建议群聊场景设置 60-180 秒，私聊场景可设为 0。
# 注意：撤回功能依赖平台适配器支持，若不支持则静默跳过。
recall_after_seconds = 90